<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <script>
    (function(){var t=localStorage.getItem('fp_theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlushPay — Chaque pause est payée</title>
  <meta name="description" content="Combien gagnez-vous pendant vos pauses toilettes ? FlushPay calcule ça en temps réel.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient background orb -->
  <div class="bg-orb" aria-hidden="true"></div>

  <!-- ── TOPBAR ── -->
  <header class="topbar">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="28" height="28" rx="8" fill="var(--accent)"/>
        <path d="M14 5C14 5 9 10.2 9 14.5A5 5 0 0014 19.5 5 5 0 0019 14.5C19 10.2 14 5 14 5Z" fill="var(--accent-fg)"/>
        <path d="M12.5 13L14.5 12V16.5" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 16.5H16" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="logo-text">FlushPay</span>
      <span class="logo-badge">BETA</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Changer le thème" title="Thème clair / sombre">
        <svg class="sun-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18M4.22 4.22l1.06 1.06M14.72 14.72l1.06 1.06M4.22 15.78l1.06-1.06M14.72 5.28l1.06-1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <svg class="moon-icon" viewBox="0 0 20 20" fill="none"><path d="M17 12.5A7 7 0 117.5 3a5.5 5.5 0 109.5 9.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="ghost-btn" onclick="clearAll()">
        <svg viewBox="0 0 16 16" fill="none" width="13" height="13"><path d="M3 4h10M6 4V3h4v1M5 4v8h6V4H5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Effacer
      </button>
    </div>
  </header>

  <main class="main">

    <!-- ── HERO SECTION ── -->
    <section class="hero" aria-label="Chronomètre de pause">

      <!-- Status pill -->
      <div class="status-pill" id="sessionBadge">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="badgeLabel">En attente</span>
      </div>

      <!-- THE BIG NUMBER -->
      <div class="counter-stage" aria-live="polite" aria-atomic="true" aria-label="Montant gagné">
        <div class="counter-row">
          <span class="c-sym" id="cCur">€</span>
          <span class="c-int" id="cInt">0</span>
          <span class="c-sep">,</span>
          <span class="c-cents" id="cDecBig">00</span>
          <span class="c-micro" id="cDecSmall">0000</span>
        </div>
        <p class="counter-label" id="heroSub">gagné pendant cette pause</p>
      </div>

      <!-- Timer display -->
      <div class="timer-wrap">
        <div class="timer-display" id="timerDisplay" aria-live="polite">00:00:00</div>
      </div>

      <!-- Type selector -->
      <div class="type-selector" role="group" aria-label="Type de pause">
        <button class="type-btn active" id="tabPipi" onclick="setType('pipi')">
          <span class="type-emoji">💧</span>
          <span>Pipi</span>
        </button>
        <button class="type-btn" id="tabCaca" onclick="setType('caca')">
          <span class="type-emoji">💩</span>
          <span>Caca</span>
        </button>
      </div>

      <!-- Actions -->
      <div class="action-row">
        <button class="btn-primary" id="startBtn" onclick="startTimer()">
          <svg viewBox="0 0 16 16" fill="none" width="14" height="14"><path d="M5 3.5l8 4.5-8 4.5V3.5z" fill="currentColor"/></svg>
          Démarrer
        </button>
        <button class="btn-dark" id="stopBtn" onclick="stopTimer()" disabled>
          <svg viewBox="0 0 16 16" fill="none" width="12" height="12"><rect x="3" y="3" width="10" height="10" rx="1.5" fill="currentColor"/></svg>
          Terminer
        </button>
        <button class="btn-ghost" id="cancelBtn" onclick="cancelTimer()" disabled>
          <svg viewBox="0 0 16 16" fill="none" width="13" height="13"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Annuler
        </button>
      </div>

    </section>

    <!-- ── SALARY CONFIG ── -->
    <div class="config-row">
      <label class="config-field" for="salaryInput">
        <span class="config-label">Salaire horaire</span>
        <div class="config-input-wrap">
          <input
            class="config-input"
            type="number"
            id="salaryInput"
            placeholder="15.00"
            min="0"
            step="0.5"
            value="15"
            aria-label="Salaire horaire brut"
          >
          <span class="config-suffix">brut / h</span>
        </div>
      </label>
      <label class="config-field" for="currencySelect">
        <span class="config-label">Devise</span>
        <select class="config-select" id="currencySelect" aria-label="Devise">
          <option value="€ EUR">€ EUR</option>
          <option value="$ USD">$ USD</option>
          <option value="£ GBP">£ GBP</option>
          <option value="¥ JPY">¥ JPY</option>
        </select>
      </label>
    </div>

    <!-- ── STATS ── -->
    <div class="stats-grid" role="region" aria-label="Statistiques">
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-body">
          <div class="stat-value green" id="statTotal">0,00€</div>
          <div class="stat-name">Total gagné</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏱</div>
        <div class="stat-body">
          <div class="stat-value" id="statTime">0 min</div>
          <div class="stat-name">Temps total</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🚽</div>
        <div class="stat-body">
          <div class="stat-value" id="statCount">0</div>
          <div class="stat-name">Pauses</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">∅</div>
        <div class="stat-body">
          <div class="stat-value" id="statAvg">—</div>
          <div class="stat-name">Durée moy.</div>
        </div>
      </div>
    </div>

    <!-- ── CHART ── -->
    <div class="chart-card" id="chartSection" style="display:none">
      <div class="section-header">
        <span class="section-title">Répartition</span>
      </div>
      <div class="bar-chart" id="barChart"></div>
    </div>

    <!-- ── HISTORY ── -->
    <section class="history-card" aria-label="Historique des pauses">
      <div class="section-header">
        <span class="section-title">Historique</span>
        <button class="text-btn" onclick="clearAll()">Tout effacer</button>
      </div>
      <div id="historyList">
        <div class="empty-state">
          <div class="empty-icon">🚽</div>
          <p class="empty-title">Aucune pause enregistrée</p>
          <p class="empty-sub">Lance ton premier chrono pour commencer</p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>FlushPay</span>
      <span class="footer-sep">·</span>
      <span>Chaque pause est payée</span>
    </footer>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast" aria-live="assertive"></div>

  <script src="app.js"></script>
</body>
</html>
